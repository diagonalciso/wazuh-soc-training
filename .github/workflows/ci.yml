name: ci
on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python
        run: python3 -m py_compile app.py injector.py scoring.py config.py

      - name: Validate scenarios (JSON)
        run: python3 -c "import json,glob;[json.load(open(p)) for p in glob.glob('scenarios/*.json')]"

      - name: Shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck deploy.sh lab/*.sh

      - name: Hadolint (agent Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: lab/agent.Dockerfile
